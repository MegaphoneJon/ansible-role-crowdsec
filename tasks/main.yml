- name: Download (armored) GPG key
  ansible.builtin.get_url:
    url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
    dest: /tmp/crowdsec.asc

- name: Convert CrowdSec key to dearmored format
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/crowdsec.gpg /tmp/crowdsec.asc
    creates: /etc/apt/keyrings/crowdsec.gpg


- name: Add CrowdSec repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.gpg] https://packagecloud.io/crowdsec/crowdsec/any any main"
    state: present
    filename: crowdsec

- name: Install Crowdsec
  apt:
    update_cache: true
    name: crowdsec
    state: present
  notify: restart crowdsec

# Not sure why this works better when not installed simultaneously with crowdsec
- name: Install bouncer
  apt:
    update_cache: true
    name: crowdsec-firewall-bouncer-nftables
    state: present
  notify: restart crowdsec

- name: Install custom scenarios
  copy:
    src: "{{ item }}"
    dest: /etc/crowdsec/scenarios/
  with_fileglob:
      - files/scenarios/*
  notify: restart crowdsec

- name: Install custom parsers
  copy:
    src: "{{ item }}"
    dest: /etc/crowdsec/parsers/s02-enrich
  with_fileglob:
      - files/parsers/s02-enrich/*
      - "files/{{fqdn}}/crowdsec-custom/parsers/s02-enrich/*"
  notify: restart crowdsec
  tags: parsers

# Installs badstrings.txt
- name: cscli hub upgrade
  command:
    cmd: cscli hub upgrade 
  changed_when: false

- name: Combine "users" and "additional users"
  set_fact:
    greenlist: "{{ greenlist_ips | union([ansible_host]) | union(additional_greenlist| default([])) }}"
  tags: crowdtest

- name: create allowlist
  command:
    cmd: "cscli allowlist create megaphone --description 'Megaphone IPs'"
  failed_when: false

- name: add allowlist IPs to crowdsec
  shell: "cscli allowlist add megaphone {{ greenlist|join(' ') }}"

- name: Read config.yaml (to remove api.server)
  ansible.builtin.slurp:
    src: /etc/crowdsec/config.yaml
  register: crowdsec_config_raw
  when: ansible_host != primary_icinga_server_ip
  tags: top

- name: Parse and modify config
  ansible.builtin.set_fact:
    crowdsec_config: >-
      {{
        crowdsec_config_raw.content | b64decode | from_yaml
        | ansible.utils.remove_keys(target=['server'])
      }}
  when: ansible_host != primary_icinga_server_ip
  tags: top

- name: Write modified config.yaml
  ansible.builtin.copy:
    content: "{{ crowdsec_config | to_nice_yaml }}"
    dest: /etc/crowdsec/config.yaml
    owner: root
    group: root
    mode: '0600'
  notify: restart crowdsec
  when: ansible_host != primary_icinga_server_ip
  tags: top

- name: Register with central LAPI
  command: >
    cscli lapi register
    --machine "{{ fqdn }}"
    --url "http://{{ primary_icinga_server }}:8080"
  register: lapi_register
  failed_when:
    - lapi_register.rc != 0
    - '"user already exist" not in lapi_register.stderr'
  changed_when:
    - lapi_register.rc == 0

# On central server (run after)
- name: Validate registered machines
  command: cscli machines validate "{{ fqdn }}"
  delegate_to: "{{ primary_icinga_server }}"
